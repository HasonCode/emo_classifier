<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emo Music Classifier</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #888;
      margin-bottom: 2rem;
      font-size: 1rem;
      text-align: center;
    }
    .upload-zone {
      border: 2px dashed #444;
      border-radius: 16px;
      padding: 4rem 3rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      max-width: 420px;
      width: 100%;
      background: rgba(0,0,0,0.2);
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: #e91e63;
      background: rgba(233, 30, 99, 0.08);
    }
    .upload-zone input { display: none; }
    .upload-zone .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.9;
    }
    .upload-zone p {
      margin: 0;
      color: #aaa;
      font-size: 1rem;
    }
    .upload-zone .formats {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: #666;
    }
    .result {
      margin-top: 2rem;
      padding: 2rem;
      border-radius: 16px;
      max-width: 420px;
      width: 100%;
      display: none;
    }
    .result.show { display: block; }
    .result.emo {
      background: linear-gradient(135deg, rgba(233, 30, 99, 0.25), rgba(156, 39, 176, 0.2));
      border: 1px solid rgba(233, 30, 99, 0.4);
    }
    .result.not-emo {
      background: rgba(33, 150, 243, 0.15);
      border: 1px solid rgba(33, 150, 243, 0.3);
    }
    .result .verdict {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      opacity: 0.8;
      margin-bottom: 0.5rem;
    }
    .result .label {
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .result.emo .label { color: #f48fb1; }
    .result.not-emo .label { color: #90caf9; }
    .result .confidence-wrap {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .result .prob {
      font-size: 1.15rem;
      font-weight: 600;
      min-width: 5em;
    }
    .result .prob-bar {
      flex: 1;
      height: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 5px;
      overflow: hidden;
    }
    .result .prob-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.4s ease;
    }
    .result.emo .prob-fill { background: #f48fb1; }
    .result.not-emo .prob-fill { background: #90caf9; }
    .loading {
      display: none;
      margin-top: 1.5rem;
      color: #888;
      font-size: 1rem;
    }
    .loading.show { display: block; }
    .error {
      display: none;
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      background: rgba(244, 67, 54, 0.15);
      border: 1px solid rgba(244, 67, 54, 0.4);
      border-radius: 12px;
      color: #ef9a9a;
      font-size: 0.95rem;
      max-width: 420px;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <h1>🎸 Emo Music Classifier</h1>
  <p class="subtitle">Upload an audio file to get emo / not emo prediction with confidence</p>

  <label class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".mp3,.wav,.flac,.ogg,.m4a,.webm" />
    <span class="icon">📤</span>
    <p>Click or drop an audio file here</p>
    <p class="formats">MP3, WAV, FLAC, OGG, M4A</p>
  </label>

  <div class="loading" id="loading">Classifying…</div>
  <div class="error" id="error"></div>
  <div class="result" id="result">
    <div class="verdict">Verdict</div>
    <div class="label" id="resultLabel"></div>
    <div class="confidence-wrap">
      <span class="prob" id="resultProb"></span>
      <div class="prob-bar"><div class="prob-fill" id="probFill"></div></div>
    </div>
  </div>

  <script>
    const zone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const loading = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const resultEl = document.getElementById('result');
    const resultLabel = document.getElementById('resultLabel');
    const resultProb = document.getElementById('resultProb');
    const probFill = document.getElementById('probFill');

    const ALLOWED = ['.mp3', '.wav', '.flac', '.ogg', '.m4a', '.webm'];

    function reset() {
      loading.classList.remove('show');
      errorEl.classList.remove('show');
      resultEl.classList.remove('show');
    }

    function showError(msg) {
      reset();
      errorEl.textContent = msg;
      errorEl.classList.add('show');
    }

    function showResult(data) {
      reset();
      resultEl.classList.add('show');
      resultEl.classList.remove('emo', 'not-emo');
      resultEl.classList.add(data.is_emo ? 'emo' : 'not-emo');
      resultLabel.textContent = data.label;
      const confidence = data.is_emo ? data.probability : (1 - data.probability);
      const pct = (confidence * 100).toFixed(0);
      resultProb.textContent = pct + '% confident';
      probFill.style.width = pct + '%';
    }

    zone.addEventListener('click', (e) => {
      if (e.target !== fileInput) fileInput.click();
    });

    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      zone.classList.add('dragover');
    });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('dragover');
      const f = e.dataTransfer?.files?.[0];
      if (f) handleFile(f);
    });

    fileInput.addEventListener('change', () => {
      const f = fileInput.files?.[0];
      if (f) handleFile(f);
    });

    async function handleFile(file) {
      const ext = '.' + (file.name.split('.').pop()?.toLowerCase() || '');
      if (!ALLOWED.includes(ext)) {
        showError('Unsupported format. Use: ' + ALLOWED.join(', '));
        return;
      }

      reset();
      loading.classList.add('show');

      const form = new FormData();
      form.append('file', file);

      try {
        const res = await fetch('/classify', {
          method: 'POST',
          body: form,
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showError(data.detail || `Error ${res.status}`);
          return;
        }

        loading.classList.remove('show');
        showResult(data);
      } catch (e) {
        showError('Network error: ' + e.message);
      }
    }
  </script>
</body>
</html>
